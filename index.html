<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffd9e6" />
  <title>For Jojo 🌸</title>
  <meta name="description" content="A playful animated bouquet, grown just for Jojo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Dancing+Script:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <canvas id="petals"></canvas>
  <div class="stars" aria-hidden="true"></div>

  <!-- ============ 1 · HERO + BOUQUET GAME ============ -->
  <header class="hero section" id="top">
    <div class="glow" aria-hidden="true"></div>
    <p class="eyebrow">a bouquet, grown just for</p>
    <h1 class="title">Jojo</h1>

    <div class="bouquet" aria-label="An animated flower bouquet of roses, lilies and peonies — tap the flowers to play">
      <svg viewBox="0 0 480 600" class="bouquet__svg" role="img">
        <g class="wrap-group">
          <path class="wrap wrap--back"  d="M240 400 L175 580 Q240 606 305 580 Z" />
          <path class="wrap wrap--left"  d="M240 400 L140 556 Q186 582 240 546 Z" />
          <path class="wrap wrap--right" d="M240 400 L340 556 Q294 582 240 546 Z" />
          <path class="wrap wrap--front" d="M240 400 L192 580 Q240 596 288 580 Z" />
          <path class="tie" d="M200 428 Q240 410 280 428 L274 456 Q240 442 206 456 Z" />
        </g>
        <g class="stems" fill="none" stroke="#4f8557" stroke-width="4.5" stroke-linecap="round"></g>
        <g class="leaves" fill="#67a86f"></g>
        <g class="blossoms"></g>
      </svg>
    </div>

    <p class="verdict" id="verdict">tap a flower to play 🌸</p>
    <p class="progress" id="progress">0 / 14 picked</p>

    <a class="scroll-hint" href="#finale">
      <span>when you've picked them all 🌷</span>
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 4v14M6 12l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </header>

  <!-- ============ 2 · FINALE ============ -->
  <section class="section finale-section" id="finale">
    <div class="reveal">
      <h2 class="script">ready for all of them?</h2>
      <p class="lede">press it. trust me.</p>
    </div>
    <button class="gift-btn" id="giftBtn">
      <span>shower me with flowers</span>
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 3C7 3 3 6.6 3 11c0 2.2 1 4 2.6 5.2C7 17.4 9.3 18 12 18s5-.6 6.4-1.8C20 15 21 13.2 21 11c0-4.4-4-8-9-8Z" fill="currentColor"/></svg>
    </button>
    <p class="finale-msg" id="finaleMsg">🌸 all yours, always 🌸</p>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="footer">
    <div class="divider" aria-hidden="true">✿ ❀ ✿ ❀ ✿</div>
    <blockquote class="quote">“Because you always deserve flowers.”</blockquote>
    <p class="footer__name">for Jojo, always 🌸</p>
  </footer>

  <button class="mute" id="muteBtn" aria-label="Toggle ambient sound" title="ambient sound">🔈</button>
  <script src="script.js"></script>
</body>
</html>
