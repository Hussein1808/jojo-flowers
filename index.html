<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Jojo 🌸</title>
  <meta name="description" content="An animated bouquet, for Jojo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>
  <canvas id="petals"></canvas>
  <div class="stars" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>

  <main class="screen">
    <p class="eyebrow">a bouquet, grown just for</p>
    <h1 class="title">Jojo</h1>

    <!-- ============ ANIMATED BOUQUET (built by script.js) ============ -->
    <div class="bouquet" aria-label="An animated flower bouquet of roses, lilies and peonies">
      <svg viewBox="0 0 480 600" class="bouquet__svg" role="img">
        <!-- paper wrap -->
        <g class="wrap-group">
          <path class="wrap wrap--back"  d="M240 400 L175 580 Q240 606 305 580 Z" />
          <path class="wrap wrap--left"  d="M240 400 L140 556 Q186 582 240 546 Z" />
          <path class="wrap wrap--right" d="M240 400 L340 556 Q294 582 240 546 Z" />
          <path class="wrap wrap--front" d="M240 400 L192 580 Q240 596 288 580 Z" />
          <path class="tie" d="M200 428 Q240 410 280 428 L274 456 Q240 442 206 456 Z" />
        </g>

        <g class="stems" fill="none" stroke="#4f8557" stroke-width="4.5" stroke-linecap="round"></g>
        <g class="leaves" fill="#67a86f"></g>
        <g class="blossoms"></g>
      </svg>
    </div>

    <blockquote class="quote">“Because you always deserve flowers.”</blockquote>
    <p class="hint" id="hint">tap a flower · click anywhere for petals</p>
  </main>

  <button class="mute" id="muteBtn" aria-label="Toggle ambient sound" title="ambient sound">🔈</button>
  <script src="script.js"></script>
</body>
</html>
